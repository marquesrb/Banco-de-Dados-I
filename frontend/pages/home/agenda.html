<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetManager - Agenda</title>
    <link rel="stylesheet" href="../../components/header/styles.css">
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>

<body>
    <!-- Header será carregado aqui -->
    <script src="/components/header/header.js"></script>
    <div id="header"></div>
    
    <div class="container">
        <h1>Agenda</h1>

        <!-- Filtros -->

        <div class="form-group">
            <label for="filtro-funcionario">Funcionário:</label>
            <select id="filtro-funcionario" class="form-control">
                <option value="">Selecione um Funcionário</option>
                <option value="func1">Funcionário 1</option>
                <option value="func2">Funcionário 2</option>
            </select>
        </div>

        <div class="form-group">
            <label for="data-inicio">Data Início:</label>
            <input type="date" id="data-inicio" class="form-control">
        </div>

        <div class="form-group">
            <label for="data-fim">Data Fim:</label>
            <input type="date" id="data-fim" class="form-control">
        </div>

        <button id="aplicar-filtros" class="btn btn-primary">Aplicar Filtros</button>

        <!-- Tabela de Agendamentos -->
        <div id="historico-agendamentos">
            <h2>Agendamentos</h2>
            <table id="tabela-agendamentos" class="table table-striped">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Funcionário</th>
                        <th>Serviço</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Os dados da tabela serão preenchidos dinamicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Exemplo de dados de agendamentos
        const agendamentos = [
            { data: "2024-11-20", cliente: "123", funcionario: "func1", servico: "Banho", status: "Concluído" },
            { data: "2024-11-21", cliente: "123", funcionario: "func1", servico: "Tosa", status: "Pendente" },
            { data: "2024-11-22", cliente: "456", funcionario: "func2", servico: "Banho", status: "Concluído" },
            { data: "2024-11-23", cliente: "456", funcionario: "func1", servico: "Banho", status: "Concluído" }
        ];

        // Função para exibir os agendamentos com base nos filtros
        function exibirAgendamentos() {
            const rg = document.getElementById("filtro-rg").value;
            const funcionario = document.getElementById("filtro-funcionario").value;
            const dataInicio = document.getElementById("data-inicio").value;
            const dataFim = document.getElementById("data-fim").value;

            const tabela = document.getElementById("tabela-agendamentos").getElementsByTagName("tbody")[0];
            tabela.innerHTML = ''; 

            // Filtrando os agendamentos
            const agendamentosFiltrados = agendamentos.filter(agendamento => {
                const dataAgendamento = agendamento.data;
                const dataValida = (!dataInicio || dataAgendamento >= dataInicio) && (!dataFim || dataAgendamento <= dataFim);
                const clienteValido = !rg || agendamento.cliente === rg;
                const funcionarioValido = !funcionario || agendamento.funcionario === funcionario;
                return dataValida && clienteValido && funcionarioValido;
            });

            // Adicionando as linhas na tabela
            agendamentosFiltrados.forEach(agendamento => {
                const row = tabela.insertRow();
                row.insertCell(0).textContent = agendamento.data;
                row.insertCell(1).textContent = agendamento.cliente;
                row.insertCell(2).textContent = agendamento.funcionario;
                row.insertCell(3).textContent = agendamento.servico;
                row.insertCell(4).textContent = agendamento.status;
            });
        }

        document.getElementById("aplicar-filtros").addEventListener("click", exibirAgendamentos);
    </script>
</body>

</html>
